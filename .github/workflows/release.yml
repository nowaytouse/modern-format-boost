name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.optional == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macos-arm64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macos-x64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x64
            optional: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pkg-config clang cmake nasm ninja-build meson \
            libde265-dev libx265-dev libaom-dev \
            libturbojpeg0-dev libpng-dev

          # dav1d >= 1.3.0 required by dav1d-sys; Ubuntu 22.04 ships 0.9.2.
          # Build dav1d 1.5.1 from source.
          cd /tmp
          curl -fsSL https://code.videolan.org/videolan/dav1d/-/archive/1.5.1/dav1d-1.5.1.tar.gz \
            -o dav1d.tar.gz
          tar xzf dav1d.tar.gz
          cd dav1d-1.5.1
          meson setup build --buildtype=release --prefix=/usr/local -Denable_tools=false -Denable_tests=false
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig

          # libheif >= 1.21 required by libheif-rs 2.7; Ubuntu 22.04 ships 1.12.
          # Build libheif 1.21.0 from source.
          cd /tmp
          curl -fsSL https://github.com/strukturag/libheif/releases/download/v1.21.0/libheif-1.21.0.tar.gz \
            -o libheif.tar.gz
          tar xzf libheif.tar.gz
          cd libheif-1.21.0
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DWITH_EXAMPLES=OFF \
            -DWITH_TESTING=OFF
          cmake --build build --parallel
          sudo cmake --install build
          sudo ldconfig

          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/local/lib/x86_64-linux-gnu/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

      # ── macOS ARM64 (native) ────────────────────────────────────────────────
      - name: Install dependencies (macOS ARM64)
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          brew install libheif dav1d jpeg-xl
          BREW=$(brew --prefix)
          echo "PKG_CONFIG_PATH=${BREW}/lib/pkgconfig:${BREW}/opt/dav1d/lib/pkgconfig:${BREW}/opt/jpeg-xl/lib/pkgconfig" >> "$GITHUB_ENV"

      # ── macOS x86_64 (cross-compile via Rosetta brew) ──────────────────────
      - name: Install dependencies (macOS x86_64)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          # Install Homebrew for x86_64 under Rosetta 2
          if [ ! -f /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" <<< ""
          fi
          # Install x86_64 native libraries
          arch -x86_64 /usr/local/bin/brew install libheif dav1d jpeg-xl
          # Point pkg-config to x86_64 libs
          echo "PKG_CONFIG_PATH=/usr/local/opt/libheif/lib/pkgconfig:/usr/local/opt/dav1d/lib/pkgconfig:/usr/local/opt/jpeg-xl/lib/pkgconfig:/usr/local/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          # Linker must find x86_64 dylibs
          echo "LIBRARY_PATH=/usr/local/lib:${LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER=clang" >> "$GITHUB_ENV"

      # ── Windows ────────────────────────────────────────────────────────────
      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\packages
          key: vcpkg-x64-windows-libheif-dav1d-${{ hashFiles('.github/workflows/release.yml') }}

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:VCPKG_BINARY_SOURCES = "clear;files,$env:VCPKG_INSTALLATION_ROOT\packages,readwrite"
          vcpkg install libheif:x64-windows-static dav1d:x64-windows-static libjxl:x64-windows-static --recurse
          $root = $env:VCPKG_INSTALLATION_ROOT
          echo "VCPKG_ROOT=$root" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=$root\installed\x64-windows-static\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "VCPKGRS_TRIPLET=x64-windows-static" >> $env:GITHUB_ENV
          echo "VCPKGRS_DYNAMIC=0" >> $env:GITHUB_ENV

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build release binaries
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} \
            -p vid-hevc -p vid-av1 -p img-hevc -p img-av1

      # ── Package ────────────────────────────────────────────────────────────
      - name: Package artifacts
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="ModernFormatBoost-${TAG}-${{ matrix.artifact_name }}.zip"
          mkdir -p dist
          EXT=""
          [[ "${{ matrix.os }}" == windows-* ]] && EXT=".exe"

          for bin in vid-hevc vid-av1 img-hevc img-av1; do
            cp "target/${{ matrix.target }}/release/${bin}${EXT}" dist/
          done
          cp -r scripts dist/
          cp README.md dist/ 2>/dev/null || true
          cp LICENSE   dist/ 2>/dev/null || true

          cd dist
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            7z a "../${ARCHIVE}" .
          else
            zip -r "../${ARCHIVE}" .
          fi
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact (inter-job)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ModernFormatBoost-*-${{ matrix.artifact_name }}.zip
          if-no-files-found: error

  # ── Create / update GitHub Release ─────────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - name: Checkout (for CHANGELOG)
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -lh release-assets/

      - name: Extract version changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## \[?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md 2>/dev/null | head -80)
          if [ -z "$NOTES" ]; then
            NOTES="See commit history for changes in ${TAG}."
          fi
          printf '%s\n' "$NOTES" > /tmp/release_notes.md

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: /tmp/release_notes.md
          files: release-assets/*.zip
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}
