[workspace]
members = [
    "vid_av1",
    "vid_hevc",
    "img_hevc",
    "img_av1",
    "shared_utils"
]
resolver = "2"

[workspace.package]
version = "0.10.20"
edition = "2021"
license = "MIT"
authors = ["Modern Format Boost Contributors"]

[workspace.dependencies]
# Core error handling (GitHub stable)
anyhow    = { git = "https://github.com/dtolnay/anyhow",    tag = "1.0.97" }
thiserror = { git = "https://github.com/dtolnay/thiserror", tag = "2.0.12" }

# Logging and tracing (crates.io — complex feature dependencies)
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter", "json"] }
tracing-appender   = "0.2"

# CLI (GitHub stable)
clap = { git = "https://github.com/clap-rs/clap", tag = "v4.5.38", features = ["derive", "cargo"] }

# Serialization (crates.io — tightly coupled versions)
serde      = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Parallelism (crates.io — complex dependency tree)
rayon = "1.11"

# Progress indicators (crates.io)
indicatif = { version = "0.18", features = ["rayon"] }

# File system utilities (GitHub stable)
walkdir  = { git = "https://github.com/BurntSushi/walkdir", tag = "2.5.0" }
filetime = { git = "https://github.com/alexcrichton/filetime", tag = "0.2.25" }
libc     = "0.2"
xattr    = { git = "https://github.com/Stebalien/xattr", tag = "v1.3.1" }

# System utilities (GitHub stable)
which = { git = "https://github.com/harryfei/which-rs", tag = "8.0.0" }
log   = { git = "https://github.com/rust-lang/log", tag = "0.4.22" }

# Terminal (crates.io — console has breaking changes in GitHub)
console = "0.16"
chrono  = { git = "https://github.com/chronotope/chrono", tag = "v0.4.40", features = ["serde"] }

# Image processing (GitHub stable)
image       = { git = "https://github.com/image-rs/image", tag = "v0.25.6", features = ["png", "jpeg", "webp", "gif", "tiff", "avif", "avif-native"] }
libheif-rs  = { git = "https://github.com/Cykooz/libheif-rs", tag = "v2.7.0" }

# Testing and compression (GitHub stable)
tempfile = { git = "https://github.com/Stebalien/tempfile", tag = "v3.19.1" }
proptest = { git = "https://github.com/proptest-rs/proptest", tag = "v1.6.0" }
flate2   = { git = "https://github.com/rust-lang/flate2-rs", tag = "1.1.1" }

# Signal handling (crates.io)
ctrlc = "3.4"

shared_utils = { path = "shared_utils" }

[profile.release]
lto            = true
opt-level      = 3
codegen-units  = 1
strip          = "symbols"

[profile.dev]
opt-level = 0
