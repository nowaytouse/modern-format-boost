[workspace]
members = [
    "vid_av1",
    "vid_hevc",
    "img_hevc",
    "img_av1",
    "shared_utils"
]
resolver = "2"

[workspace.package]
version = "0.10.1"
edition = "2021"
license = "MIT"
authors = ["Modern Format Boost Contributors"]

[workspace.dependencies]
anyhow = { git = "https://github.com/dtolnay/anyhow.git" }
thiserror = { git = "https://github.com/dtolnay/thiserror.git" }

tracing = { git = "https://github.com/tokio-rs/tracing.git" }
tracing-subscriber = { git = "https://github.com/tokio-rs/tracing.git", features = ["fmt", "env-filter", "json"] }
tracing-appender = { git = "https://github.com/tokio-rs/tracing.git" }

clap = { git = "https://github.com/clap-rs/clap.git", features = ["derive", "cargo"] }

serde = { git = "https://github.com/serde-rs/serde.git", features = ["derive"] }
serde_json = { git = "https://github.com/serde-rs/json.git" }

rayon = "1.11"

indicatif = { git = "https://github.com/console-rs/indicatif.git", features = ["rayon"] }

walkdir = { git = "https://github.com/BurntSushi/walkdir.git" }
filetime = { git = "https://github.com/alexcrichton/filetime.git" }
libc = { git = "https://github.com/rust-lang/libc.git" }
xattr = { git = "https://github.com/Stebalien/xattr.git" }

which = { git = "https://github.com/harryfei/which-rs.git" }
log = { git = "https://github.com/rust-lang/log.git" }

console = { git = "https://github.com/console-rs/console.git" }
chrono = { git = "https://github.com/chronotope/chrono.git", features = ["serde"] }

image = { git = "https://github.com/image-rs/image.git", features = ["png", "jpeg", "webp", "gif", "tiff", "avif", "avif-native"] }
libheif-rs = { git = "https://github.com/Cykooz/libheif-rs.git" }

tempfile = { git = "https://github.com/Stebalien/tempfile.git" }
proptest = { git = "https://github.com/proptest-rs/proptest.git" }
flate2 = { git = "https://github.com/rust-lang/flate2-rs.git" }

shared_utils = { path = "shared_utils" }

[profile.release]
lto = true
opt-level = 3
codegen-units = 1

[profile.dev]
opt-level = 0
